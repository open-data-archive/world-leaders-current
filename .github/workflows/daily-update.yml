name: Daily Leaders Update

on:
  schedule:
    - cron: '0 12 * * *'      # 12:00 UTC daily
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 30

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Run daily update
        run: cd scripts && node main.js

      - name: Commit changes
        run: |
          git config user.name "Leaders Update Bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "Update: $(date -u +'%Y-%m-%d')"
          git push
